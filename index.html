0\u0651 \u0627\u0644\u0652\u0639\u064E\u0627\u0644\u064E\u0645\u0650\u064A\u0646\u064E",en:"All praise is for Allah\u2014Lord of all worlds,",ur:"\u062A\u0645\u0627\u0645 \u062A\u0639\u0631\u06CC\u0641 \u0627\u0644\u0644\u06C1 \u06A9\u06D2 \u0644\u06CC\u06D2 \u06C1\u06D2 \u062C\u0648 \u0633\u0627\u0631\u06D2 \u062C\u06C1\u0627\u0646\u0648\u06BA \u06A9\u0627 \u0631\u0628 \u06C1\u06D2\u06D4",tafsir:{ghamidi:"Praise belongs to Allah alone because He is Rabb \u2014 the One who creates, nourishes and brings every world to its completion. Gratitude is the natural response to recognising this.",maududi:"\u201CRabb\u201D combines the meanings of owner, sustainer and sovereign \u2014 the whole of existence is under His nurturing care."}},{ar:"\u0627\u0644\u0631\u064E\u0651\u062D\u0652\u0645\u0670\u0646\u0650 \u0627\u0644\u0631\u064E\u0651\u062D\u0650\u064A\u0645\u0650",en:"the most Compassionate, the most Merciful,",ur:"\u062C\u0648 \u0646\u06C1\u0627\u06CC\u062A \u0645\u06C1\u0631\u0628\u0627\u0646\u060C \u0631\u062D\u0645 \u0648\u0627\u0644\u0627 \u06C1\u06D2\u06D4",tafsir:{ghamidi:"His lordship is not harsh but rooted in mercy \u2014 Ra\u1E25m\u0101n points to His all-embracing mercy over creation, Ra\u1E25\u012Bm to the special mercy reserved for those who turn to Him."}},{ar:"\u0645\u064E\u0627\u0644\u0650\u0643\u0650 \u064A\u064E\u0648\u0652\u0645\u0650 \u0627\u0644\u062F\u0650\u0651\u064A\u0646\u0650",en:"Master of the Day of Judgment.",ur:"\u0631\u0648\u0632\u0650 \u062C\u0632\u0627 \u06A9\u0627 \u0645\u0627\u0644\u06A9\u06D4",tafsir:{ghamidi:"After mercy comes justice: He alone is sovereign on the Day when every deed is requited, which gives human life its moral seriousness."}},{ar:"\u0625\u0650\u064A\u064E\u0651\u0627\u0643\u064E \u0646\u064E\u0639\u0652\u0628\u064F\u062F\u064F \u0648\u064E\u0625\u0650\u064A\u064E\u0651\u0627\u0643\u064E \u0646\u064E\u0633\u0652\u062A\u064E\u0639\u0650\u064A\u0646\u064F",en:"You \u02F9alone\u02FA we worship and You \u02F9alone\u02FA we ask for help.",ur:"\u06C1\u0645 \u062A\u06CC\u0631\u06CC \u06C1\u06CC \u0639\u0628\u0627\u062F\u062A \u06A9\u0631\u062A\u06D2 \u06C1\u06CC\u06BA \u0627\u0648\u0631 \u062A\u062C\u06BE \u06C1\u06CC \u0633\u06D2 \u0645\u062F\u062F \u0645\u0627\u0646\u06AF\u062A\u06D2 \u06C1\u06CC\u06BA\u06D4",tafsir:{ghamidi:"The pivot of the s\u016Brah: having recognised who Allah is, the servant pledges exclusive worship and exclusive reliance \u2014 the essence of taw\u1E25\u012Bd in practice.",maududi:"The shift from speaking about God to speaking to God shows that true knowledge of Him draws the heart into direct devotion."}},{ar:"\u0627\u0647\u0652\u062F\u0650\u0646\u064E\u0627 \u0627\u0644\u0635\u0650\u0651\u0631\u064E\u0627\u0637\u064E \u0627\u0644\u0652\u0645\u064F\u0633\u0652\u062A\u064E\u0642\u0650\u064A\u0645\u064E",en:"Guide us along the Straight Path,",ur:"\u06C1\u0645\u06CC\u06BA \u0633\u06CC\u062F\u06BE\u06D2 \u0631\u0627\u0633\u062A\u06D2 \u06A9\u06CC \u06C1\u062F\u0627\u06CC\u062A \u062F\u06D2\u06D4",tafsir:{ghamidi:"The one thing the servant asks for above all is guidance to the straight path \u2014 steadiness upon the way that leads to Allah\u2019s pleasure."}},{ar:"\u0635\u0650\u0631\u064E\u0627\u0637\u064E \u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u0623\u064E\u0646\u0652\u0639\u064E\u0645\u0652\u062A\u064E \u0639\u064E\u0644\u064E\u064A\u0652\u0647\u0650\u0645\u0652 \u063A\u064E\u064A\u0652\u0631\u0650 \u0627\u0644\u0652\u0645\u064E\u063A\u0652\u0636\u064F\u0648\u0628\u0650 \u0639\u064E\u0644\u064E\u064A\u0652\u0647\u0650\u0645\u0652 \u0648\u064E\u0644\u064E\u0627 \u0627\u0644\u0636\u064E\u0651\u0627\u0644\u0650\u0651\u064A\u0646\u064E",en:"the Path of those You have blessed\u2014not those who incurred \u02F9Your\u02FA wrath, or those who are astray.",ur:"\u0627\u0646 \u0644\u0648\u06AF\u0648\u06BA \u06A9\u0627 \u0631\u0627\u0633\u062A\u06C1 \u062C\u0646 \u067E\u0631 \u062A\u064F\u0648 \u0646\u06D2 \u0627\u0646\u0639\u0627\u0645 \u06A9\u06CC\u0627\u060C \u0646\u06C1 \u06A9\u06C1 \u0627\u0646 \u06A9\u0627 \u062C\u0646 \u067E\u0631 \u063A\u0636\u0628 \u06C1\u0648\u0627 \u0627\u0648\u0631 \u0646\u06C1 \u06AF\u0645\u0631\u0627\u06C1\u0648\u06BA \u06A9\u0627\u06D4",tafsir:{ghamidi:"The blessed are the prophets and the righteous who both knew the truth and acted on it; the two failed groups are those who knew but rebelled, and those who strayed for want of knowledge."}}]},2:{bismillah:!0,partial:!0,ayahs:[{ar:"\u0627\u0644\u0653\u0645\u0653",en:"Alif-L\u0101m-M\u012Bm.",ur:"\u0627\u0644\u0653\u0645\u0653\u06D4",tafsir:{ghamidi:"These are the \u201Cdisjointed letters\u201D that open several s\u016Brahs; their precise meaning rests with Allah, while they also draw attention to the inimitable speech that follows."}},{ar:"\u0630\u0670\u0644\u0650\u0643\u064E \u0627\u0644\u0652\u0643\u0650\u062A\u064E\u0627\u0628\u064F \u0644\u064E\u0627 \u0631\u064E\u064A\u0652\u0628\u064E \u06DB \u0641\u0650\u064A\u0647\u0650 \u06DB \u0647\u064F\u062F\u064B\u0649 \u0644\u0650\u0651\u0644\u0652\u0645\u064F\u062A\u064E\u0651\u0642\u0650\u064A\u0646\u064E",en:"This is the Book! There is no doubt about it\u2014a guide for those mindful \u02F9of Allah\u02FA,",ur:"\u06CC\u06C1 \u06A9\u062A\u0627\u0628 \u06C1\u06D2\u060C \u0627\u0633 \u0645\u06CC\u06BA \u06A9\u0648\u0626\u06CC \u0634\u06A9 \u0646\u06C1\u06CC\u06BA\u060C \u067E\u0631\u06C1\u06CC\u0632\u06AF\u0627\u0631\u0648\u06BA \u06A9\u06D2 \u0644\u06CC\u06D2 \u06C1\u062F\u0627\u06CC\u062A \u06C1\u06D2\u06D4",tafsir:{ghamidi:"The Qur\u2019\u0101n declares itself free of doubt; yet its guidance is realised only by the muttaq\u012B \u2014 the one whose heart is open and God-conscious."}},{ar:"\u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u064A\u064F\u0624\u0652\u0645\u0650\u0646\u064F\u0648\u0646\u064E \u0628\u0650\u0627\u0644\u0652\u063A\u064E\u064A\u0652\u0628\u0650 \u0648\u064E\u064A\u064F\u0642\u0650\u064A\u0645\u064F\u0648\u0646\u064E \u0627\u0644\u0635\u064E\u0651\u0644\u064E\u0627\u0629\u064E \u0648\u064E\u0645\u0650\u0645\u064E\u0651\u0627 \u0631\u064E\u0632\u064E\u0642\u0652\u0646\u064E\u0627\u0647\u064F\u0645\u0652 \u064A\u064F\u0646\u0641\u0650\u0642\u064F\u0648\u0646\u064E",en:"who believe in the unseen, establish prayer, and donate from what We have provided for them,",ur:"\u062C\u0648 \u063A\u06CC\u0628 \u067E\u0631 \u0627\u06CC\u0645\u0627\u0646 \u0644\u0627\u062A\u06D2 \u06C1\u06CC\u06BA\u060C \u0646\u0645\u0627\u0632 \u0642\u0627\u0626\u0645 \u06A9\u0631\u062A\u06D2 \u06C1\u06CC\u06BA \u0627\u0648\u0631 \u062C\u0648 \u06C1\u0645 \u0646\u06D2 \u062F\u06CC\u0627 \u0627\u0633 \u0645\u06CC\u06BA \u0633\u06D2 \u062E\u0631\u0686 \u06A9\u0631\u062A\u06D2 \u06C1\u06CC\u06BA\u06D4",tafsir:{ghamidi:"Three marks of the God-conscious: faith in the unseen, a living relationship with Allah through prayer, and open-handed spending on others."}},{ar:"\u0648\u064E\u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u064A\u064F\u0624\u0652\u0645\u0650\u0646\u064F\u0648\u0646\u064E \u0628\u0650\u0645\u064E\u0627 \u0623\u064F\u0646\u0632\u0650\u0644\u064E \u0625\u0650\u0644\u064E\u064A\u0652\u0643\u064E \u0648\u064E\u0645\u064E\u0627 \u0623\u064F\u0646\u0632\u0650\u0644\u064E \u0645\u0650\u0646 \u0642\u064E\u0628\u0652\u0644\u0650\u0643\u064E \u0648\u064E\u0628\u0650\u0627\u0644\u0652\u0622\u062E\u0650\u0631\u064E\u0629\u0650 \u0647\u064F\u0645\u0652 \u064A\u064F\u0648\u0642\u0650\u0646\u064F\u0648\u0646\u064E",en:"and who believe in what has been revealed to you \u02F9O Prophet\u02FA and what was revealed before you, and have sure faith in the Hereafter.",ur:"\u0627\u0648\u0631 \u062C\u0648 \u0627\u0633 \u067E\u0631 \u0627\u06CC\u0645\u0627\u0646 \u0644\u0627\u062A\u06D2 \u06C1\u06CC\u06BA \u062C\u0648 \u062A\u062C\u06BE \u067E\u0631 \u0627\u0648\u0631 \u062A\u062C\u06BE \u0633\u06D2 \u067E\u06C1\u0644\u06D2 \u0646\u0627\u0632\u0644 \u06C1\u0648\u0627\u060C \u0627\u0648\u0631 \u0622\u062E\u0631\u062A \u067E\u0631 \u06CC\u0642\u06CC\u0646 \u0631\u06A9\u06BE\u062A\u06D2 \u06C1\u06CC\u06BA\u06D4",tafsir:{ghamidi:"True faith affirms the whole chain of revelation and rests on certainty about the life to come, which orders one\u2019s priorities in this world."}},{ar:"\u0623\u064F\u0648\u0644\u0670\u0626\u0650\u0643\u064E \u0639\u064E\u0644\u064E\u0649\u0670 \u0647\u064F\u062F\u064B\u0649 \u0645\u0650\u0651\u0646 \u0631\u064E\u0651\u0628\u0650\u0651\u0647\u0650\u0645\u0652 \u06D6 \u0648\u064E\u0623\u064F\u0648\u0644\u0670\u0626\u0650\u0643\u064E \u0647\u064F\u0645\u064F \u0627\u0644\u0652\u0645\u064F\u0641\u0652\u0644\u0650\u062D\u064F\u0648\u0646\u064E",en:"It is they who are \u02F9truly\u02FA guided by their Lord, and it is they who will be successful.",ur:"\u06CC\u06C1\u06CC \u0644\u0648\u06AF \u0627\u067E\u0646\u06D2 \u0631\u0628 \u06A9\u06CC \u06C1\u062F\u0627\u06CC\u062A \u067E\u0631 \u06C1\u06CC\u06BA \u0627\u0648\u0631 \u06CC\u06C1\u06CC \u06A9\u0627\u0645\u06CC\u0627\u0628 \u06C1\u06CC\u06BA\u06D4",tafsir:{ghamidi:"Such people are upon guidance from their Lord, and theirs is the lasting success \u2014 fal\u0101\u1E25 \u2014 of both worlds."}}]},94:{bismillah:!0,ayahs:[{ar:"\u0623\u064E\u0644\u064E\u0645\u0652 \u0646\u064E\u0634\u0652\u0631\u064E\u062D\u0652 \u0644\u064E\u0643\u064E \u0635\u064E\u062F\u0652\u0631\u064E\u0643\u064E",en:"Have We not uplifted your heart for you \u02F9O Prophet\u02FA,",ur:"\u06A9\u06CC\u0627 \u06C1\u0645 \u0646\u06D2 \u062A\u06CC\u0631\u0627 \u0633\u06CC\u0646\u06C1 \u062A\u06CC\u0631\u06D2 \u0644\u06CC\u06D2 \u06A9\u06BE\u0648\u0644 \u0646\u06C1\u06CC\u06BA \u062F\u06CC\u0627\u061F",tafsir:{ghamidi:"A tender reminder to the Prophet \uFDFA of the inner expansion Allah granted him \u2014 the calm and capacity to carry the burden of revelation."}},{ar:"\u0648\u064E\u0648\u064E\u0636\u064E\u0639\u0652\u0646\u064E\u0627 \u0639\u064E\u0646\u0643\u064E \u0648\u0650\u0632\u0652\u0631\u064E\u0643\u064E",en:"and relieved you of the burden",ur:"\u0627\u0648\u0631 \u062A\u062C\u06BE \u0633\u06D2 \u062A\u06CC\u0631\u0627 \u0628\u0648\u062C\u06BE \u0627\u062A\u0627\u0631 \u062F\u06CC\u0627\u060C",tafsir:{ghamidi:"The weight of his mission and the anxiety of its early days were lifted by Allah\u2019s support."}},{ar:"\u0627\u0644\u064E\u0651\u0630\u0650\u064A \u0623\u064E\u0646\u0642\u064E\u0636\u064E \u0638\u064E\u0647\u0652\u0631\u064E\u0643\u064E",en:"that weighed so heavily on your back,",ur:"\u062C\u0648 \u062A\u06CC\u0631\u06CC \u067E\u06CC\u0679\u06BE \u062A\u0648\u0691\u06D2 \u062F\u06CC\u062A\u0627 \u062A\u06BE\u0627\u061F",tafsir:{ghamidi:"A burden so heavy it seemed to bend the back \u2014 yet Allah eased it."}},{ar:"\u0648\u064E\u0631\u064E\u0641\u064E\u0639\u0652\u0646\u064E\u0627 \u0644\u064E\u0643\u064E \u0630\u0650\u0643\u0652\u0631\u064E\u0643\u064E",en:"and elevated your renown for you?",ur:"\u0627\u0648\u0631 \u062A\u06CC\u0631\u0627 \u0630\u06A9\u0631 \u0628\u0644\u0646\u062F \u06A9\u0631 \u062F\u06CC\u0627\u061F",tafsir:{ghamidi:"His name is raised alongside Allah\u2019s own in the call to prayer and the testimony of faith \u2014 an honour unmatched in history."}},{ar:"\u0641\u064E\u0625\u0650\u0646\u064E\u0651 \u0645\u064E\u0639\u064E \u0627\u0644\u0652\u0639\u064F\u0633\u0652\u0631\u0650 \u064A\u064F\u0633\u0652\u0631\u064B\u0627",en:"So, surely with hardship comes ease.",ur:"\u067E\u0633 \u0628\u06D2 \u0634\u06A9 \u0645\u0634\u06A9\u0644 \u06A9\u06D2 \u0633\u0627\u062A\u06BE \u0622\u0633\u0627\u0646\u06CC \u06C1\u06D2\u06D4",tafsir:{ghamidi:"A universal law of Allah\u2019s mercy: ease is bound to hardship, placed right beside it, not merely after it."}},{ar:"\u0625\u0650\u0646\u064E\u0651 \u0645\u064E\u0639\u064E \u0627\u0644\u0652\u0639\u064F\u0633\u0652\u0631\u0650 \u064A\u064F\u0633\u0652\u0631\u064B\u0627",en:"Surely with \u02F9that\u02FA hardship comes \u02F9more\u02FA ease.",ur:"\u0628\u06D2 \u0634\u06A9 \u0645\u0634\u06A9\u0644 \u06A9\u06D2 \u0633\u0627\u062A\u06BE \u0622\u0633\u0627\u0646\u06CC \u06C1\u06D2\u06D4",tafsir:{ghamidi:"The repetition is emphatic reassurance \u2014 the one hardship is flanked by ease on every side."}},{ar:"\u0641\u064E\u0625\u0650\u0630\u064E\u0627 \u0641\u064E\u0631\u064E\u063A\u0652\u062A\u064E \u0641\u064E\u0627\u0646\u0635\u064E\u0628\u0652",en:"So once you have fulfilled \u02F9your duty\u02FA, strive \u02F9in devotion\u02FA,",ur:"\u067E\u0633 \u062C\u0628 \u062A\u064F\u0648 \u0641\u0627\u0631\u063A \u06C1\u0648 \u062A\u0648 \u0639\u0628\u0627\u062F\u062A \u0645\u06CC\u06BA \u0645\u062D\u0646\u062A \u06A9\u0631\u060C",tafsir:{ghamidi:"When one task is done, do not idle \u2014 turn with fresh energy to worship and the next labour for Allah."}},{ar:"\u0648\u064E\u0625\u0650\u0644\u064E\u0649\u0670 \u0631\u064E\u0628\u0650\u0651\u0643\u064E \u0641\u064E\u0627\u0631\u0652\u063A\u064E\u0628",en:"and turn to your Lord \u02F9alone\u02FA with hope.",ur:"\u0627\u0648\u0631 \u0627\u067E\u0646\u06D2 \u0631\u0628 \u06C1\u06CC \u06A9\u06CC \u0637\u0631\u0641 \u0631\u063A\u0628\u062A \u06A9\u0631\u06D4",tafsir:{ghamidi:"Direct all longing and hope to Allah alone \u2014 the source of every relief promised in this s\u016Brah."}}]},103:{bismillah:!0,ayahs:[{ar:"\u0648\u064E\u0627\u0644\u0652\u0639\u064E\u0635\u0652\u0631\u0650",en:"By the \u02F9passage of\u02FA time!",ur:"\u0632\u0645\u0627\u0646\u06D2 \u06A9\u06CC \u0642\u0633\u0645!",tafsir:{ghamidi:"Allah swears by time itself \u2014 the silent witness against which every human life is measured."}},{ar:"\u0625\u0650\u0646\u064E\u0651 \u0627\u0644\u0652\u0625\u0650\u0646\u0633\u064E\u0627\u0646\u064E \u0644\u064E\u0641\u0650\u064A \u062E\u064F\u0633\u0652\u0631\u064D",en:"Surely humanity is in \u02F9grave\u02FA loss,",ur:"\u0628\u06D2 \u0634\u06A9 \u0627\u0646\u0633\u0627\u0646 \u062E\u0633\u0627\u0631\u06D2 \u0645\u06CC\u06BA \u06C1\u06D2\u060C",tafsir:{ghamidi:"As time passes, a person\u2019s lifespan drains away like capital being spent \u2014 most stand at a loss."}},{ar:"\u0625\u0650\u0644\u064E\u0651\u0627 \u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u0622\u0645\u064E\u0646\u064F\u0648\u0627 \u0648\u064E\u0639\u064E\u0645\u0650\u0644\u064F\u0648\u0627 \u0627\u0644\u0635\u064E\u0651\u0627\u0644\u0650\u062D\u064E\u0627\u062A\u0650 \u0648\u064E\u062A\u064E\u0648\u064E\u0627\u0635\u064E\u0648\u0652\u0627 \u0628\u0650\u0627\u0644\u0652\u062D\u064E\u0642\u0650\u0651 \u0648\u064E\u062A\u064E\u0648\u064E\u0627\u0635\u064E\u0648\u0652\u0627 \u0628\u0650\u0627\u0644\u0635\u064E\u0651\u0628\u0652\u0631\u0650",en:"except those who have faith, do good, and urge each other to the truth, and urge each other to perseverance.",ur:"\u0633\u0648\u0627\u0626\u06D2 \u0627\u0646 \u06A9\u06D2 \u062C\u0648 \u0627\u06CC\u0645\u0627\u0646 \u0644\u0627\u0626\u06D2\u060C \u0646\u06CC\u06A9 \u0639\u0645\u0644 \u06A9\u06CC\u06D2\u060C \u0627\u0648\u0631 \u0627\u06CC\u06A9 \u062F\u0648\u0633\u0631\u06D2 \u06A9\u0648 \u062D\u0642 \u0627\u0648\u0631 \u0635\u0628\u0631 \u06A9\u06CC \u062A\u0644\u0642\u06CC\u0646 \u06A9\u06CC\u06D4",tafsir:{ghamidi:"Four things rescue a life from loss: faith, righteous deeds, and a community that counsels one another to truth and to patience \u2014 Im\u0101m Sh\u0101fi\u02BF\u012B said this s\u016Brah alone would suffice mankind."}}]},105:{bismillah:!0,ayahs:[{ar:"\u0623\u064E\u0644\u064E\u0645\u0652 \u062A\u064E\u0631\u064E \u0643\u064E\u064A\u0652\u0641\u064E \u0641\u064E\u0639\u064E\u0644\u064E \u0631\u064E\u0628\u064F\u0651\u0643\u064E \u0628\u0650\u0623\u064E\u0635\u0652\u062D\u064E\u0627\u0628\u0650 \u0627\u0644\u0652\u0641\u0650\u064A\u0644\u0650",en:"Have you not seen \u02F9O Prophet\u02FA how your Lord dealt with the army of the elephant?",ur:"\u06A9\u06CC\u0627 \u062A\u064F\u0648 \u0646\u06D2 \u0646\u06C1\u06CC\u06BA \u062F\u06CC\u06A9\u06BE\u0627 \u06A9\u06C1 \u062A\u06CC\u0631\u06D2 \u0631\u0628 \u0646\u06D2 \u06C1\u0627\u062A\u06BE\u06CC \u0648\u0627\u0644\u0648\u06BA \u06A9\u06D2 \u0633\u0627\u062A\u06BE \u06A9\u06CC\u0627 \u06A9\u06CC\u0627\u061F",tafsir:{ghamidi:"A reminder of Abrahah\u2019s assault on the Ka\u02BFbah \u2014 an event near in memory to the Quraysh \u2014 to show how Allah Himself protects His House."}},{ar:"\u0623\u064E\u0644\u064E\u0645\u0652 \u064A\u064E\u062C\u0652\u0639\u064E\u0644\u0652 \u0643\u064E\u064A\u0652\u062F\u064E\u0647\u064F\u0645\u0652 \u0641\u0650\u064A \u062A\u064E\u0636\u0652\u0644\u0650\u064A\u0644\u064D",en:"Did He not frustrate their scheme?",ur:"\u06A9\u06CC\u0627 \u0627\u0633 \u0646\u06D2 \u0627\u0646 \u06A9\u06CC \u062A\u062F\u0628\u06CC\u0631 \u06A9\u0648 \u0646\u0627\u06A9\u0627\u0645 \u0646\u06C1 \u06A9\u0631 \u062F\u06CC\u0627\u061F",tafsir:{ghamidi:"Their elaborate plan to demolish the Ka\u02BFbah collapsed into utter failure."}},{ar:"\u0648\u064E\u0623\u064E\u0631\u0652\u0633\u064E\u0644\u064E \u0639\u064E\u0644\u064E\u064A\u0652\u0647\u0650\u0645\u0652 \u0637\u064E\u064A\u0652\u0631\u064B\u0627 \u0623\u064E\u0628\u064E\u0627\u0628\u0650\u064A\u0644\u064E",en:"For He sent against them flocks of birds,",ur:"\u0627\u0648\u0631 \u0627\u0646 \u067E\u0631 \u062C\u06BE\u0646\u0688 \u06A9\u06D2 \u062C\u06BE\u0646\u0688 \u067E\u0631\u0646\u062F\u06D2 \u0628\u06BE\u06CC\u062C\u06D2\u060C",tafsir:{ghamidi:"Allah turned the smallest of creatures into the instrument of a mighty army\u2019s ruin."}},{ar:"\u062A\u064E\u0631\u0652\u0645\u0650\u064A\u0647\u0650\u0645 \u0628\u0650\u062D\u0650\u062C\u064E\u0627\u0631\u064E\u0629\u064D \u0645\u0650\u0651\u0646 \u0633\u0650\u062C\u0650\u0651\u064A\u0644\u064D",en:"that pelted them with stones of baked clay,",ur:"\u062C\u0648 \u0627\u0646 \u067E\u0631 \u06A9\u06BE\u0646\u06AF\u0631 \u06A9\u06D2 \u067E\u062A\u06BE\u0631 \u067E\u06BE\u06CC\u0646\u06A9\u062A\u06D2 \u062A\u06BE\u06D2\u060C",tafsir:{ghamidi:"Small stones of hardened clay rained down with devastating effect."}},{ar:"\u0641\u064E\u062C\u064E\u0639\u064E\u0644\u064E\u0647\u064F\u0645\u0652 \u0643\u064E\u0639\u064E\u0635\u0652\u0641\u064D \u0645\u064E\u0651\u0623\u0652\u0643\u064F\u0648\u0644\u064D",en:"leaving them like chewed up straw.",ur:"\u067E\u06BE\u0631 \u0627\u0646\u06C1\u06CC\u06BA \u06A9\u06BE\u0627\u0626\u06D2 \u06C1\u0648\u0626\u06D2 \u0628\u06BE\u0648\u0633\u06D2 \u06A9\u06CC \u0637\u0631\u062D \u06A9\u0631 \u062F\u06CC\u0627\u06D4",tafsir:{ghamidi:"The proud army was reduced to the likeness of devoured chaff \u2014 a sign of Allah\u2019s power over the arrogant."}}]},108:{bismillah:!0,ayahs:[{ar:"\u0625\u0650\u0646\u064E\u0651\u0627 \u0623\u064E\u0639\u0652\u0637\u064E\u064A\u0652\u0646\u064E\u0627\u0643\u064E \u0627\u0644\u0652\u0643\u064E\u0648\u0652\u062B\u064E\u0631\u064E",en:"Indeed, We have granted you \u02F9O Prophet\u02FA abundant goodness.",ur:"\u0628\u06D2 \u0634\u06A9 \u06C1\u0645 \u0646\u06D2 \u062A\u062C\u06BE\u06D2 \u06A9\u0648\u062B\u0631 \u0639\u0637\u0627 \u06A9\u06CC\u06D4",tafsir:{ghamidi:"Al-Kawthar is abundant good in this life and the next \u2014 including the fount of Kawthar in Paradise \u2014 given to console the Prophet \uFDFA against his detractors."}},{ar:"\u0641\u064E\u0635\u064E\u0644\u0650\u0651 \u0644\u0650\u0631\u064E\u0628\u0650\u0651\u0643\u064E \u0648\u064E\u0627\u0646\u0652\u062D\u064E\u0631\u0652",en:"So pray and sacrifice to your Lord \u02F9alone\u02FA.",ur:"\u067E\u0633 \u0627\u067E\u0646\u06D2 \u0631\u0628 \u06A9\u06D2 \u0644\u06CC\u06D2 \u0646\u0645\u0627\u0632 \u067E\u0691\u06BE \u0627\u0648\u0631 \u0642\u0631\u0628\u0627\u0646\u06CC \u06A9\u0631\u06D4",tafsir:{ghamidi:"The response to such favour is grateful devotion \u2014 prayer and sacrifice offered for Allah alone."}},{ar:"\u0625\u0650\u0646\u064E\u0651 \u0634\u064E\u0627\u0646\u0650\u0626\u064E\u0643\u064E \u0647\u064F\u0648\u064E \u0627\u0644\u0652\u0623\u064E\u0628\u0652\u062A\u064E\u0631\u064F",en:"Only the one who hates you is truly cut off \u02F9from any goodness\u02FA.",ur:"\u0628\u06D2 \u0634\u06A9 \u062A\u06CC\u0631\u0627 \u062F\u0634\u0645\u0646 \u06C1\u06CC \u0628\u06D2 \u0646\u0627\u0645 \u0648 \u0646\u0634\u0627\u0646 \u06C1\u06D2\u06D4",tafsir:{ghamidi:"It is the Prophet\u2019s enemy, not he, who is left without legacy or future \u2014 a prophecy history has confirmed."}}]},112:{bismillah:!0,ayahs:[{ar:"\u0642\u064F\u0644\u0652 \u0647\u064F\u0648\u064E \u0627\u0644\u0644\u0651\u0670\u0647\u064F \u0623\u064E\u062D\u064E\u062F\u064C",en:"Say, \u02F9O Prophet,\u02FA \u201CHe is Allah\u2014One \u02F9and indivisible\u02FA;",ur:"\u06A9\u06C1\u06C1 \u062F\u0648\u060C \u0648\u06C1 \u0627\u0644\u0644\u06C1 \u0627\u06CC\u06A9 \u06C1\u06D2\u06D4",tafsir:{ghamidi:"The s\u016Brah defines pure monotheism: Allah is One in a unique, indivisible sense, with no plurality in His being.",maududi:"A\u1E25ad denies every form of partnership or multiplicity \u2014 He is uniquely One."}},{ar:"\u0627\u0644\u0644\u0651\u0670\u0647\u064F \u0627\u0644\u0635\u064E\u0651\u0645\u064E\u062F\u064F",en:"Allah\u2014the Sustainer \u02F9needed by all\u02FA.",ur:"\u0627\u0644\u0644\u06C1 \u0628\u06D2 \u0646\u06CC\u0627\u0632 \u06C1\u06D2\u06D4",tafsir:{ghamidi:"A\u1E63-\u1E62amad: the self-sufficient One upon whom all depend while He depends on none.",maududi:"All creation turns to Him in need, while He is free of every need."}},{ar:"\u0644\u064E\u0645\u0652 \u064A\u064E\u0644\u0650\u062F\u0652 \u0648\u064E\u0644\u064E\u0645\u0652 \u064A\u064F\u0648\u0644\u064E\u062F\u0652",en:"He has never had offspring, nor was He born.",ur:"\u0646\u06C1 \u0627\u0633 \u06A9\u06CC \u06A9\u0648\u0626\u06CC \u0627\u0648\u0644\u0627\u062F \u06C1\u06D2 \u0627\u0648\u0631 \u0646\u06C1 \u0648\u06C1 \u06A9\u0633\u06CC \u0633\u06D2 \u067E\u06CC\u062F\u0627 \u06C1\u0648\u0627\u060C",tafsir:{ghamidi:"He is beyond lineage \u2014 neither begetting nor begotten \u2014 which refutes every notion of a divine family."}},{ar:"\u0648\u064E\u0644\u064E\u0645\u0652 \u064A\u064E\u0643\u064F\u0646 \u0644\u064E\u0651\u0647\u064F \u0643\u064F\u0641\u064F\u0648\u064B\u0627 \u0623\u064E\u062D\u064E\u062F\u064C",en:"And there is none comparable to Him.\u201D",ur:"\u0627\u0648\u0631 \u06A9\u0648\u0626\u06CC \u0627\u0633 \u06A9\u06D2 \u0628\u0631\u0627\u0628\u0631 \u0646\u06C1\u06CC\u06BA\u06D4",tafsir:{ghamidi:"Nothing in existence resembles or rivals Him \u2014 the seal of His absolute uniqueness."}}]},113:{bismillah:!0,ayahs:[{ar:"\u0642\u064F\u0644\u0652 \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0631\u064E\u0628\u0650\u0651 \u0627\u0644\u0652\u0641\u064E\u0644\u064E\u0642\u0650",en:"Say, \u02F9O Prophet,\u02FA \u201CI seek refuge in the Lord of the daybreak",ur:"\u06A9\u06C1\u06C1 \u062F\u0648\u060C \u0645\u06CC\u06BA \u0635\u0628\u062D \u06A9\u06D2 \u0631\u0628 \u06A9\u06CC \u067E\u0646\u0627\u06C1 \u0645\u0627\u0646\u06AF\u062A\u0627 \u06C1\u0648\u06BA\u060C",tafsir:{ghamidi:"Refuge is sought with the Lord who splits the dawn from darkness \u2014 the One who brings light and relief out of every gloom."}},{ar:"\u0645\u0650\u0646 \u0634\u064E\u0631\u0650\u0651 \u0645\u064E\u0627 \u062E\u064E\u0644\u064E\u0642\u064E",en:"from the evil of whatever He has created,",ur:"\u0627\u0633 \u06A9\u06CC \u0645\u062E\u0644\u0648\u0642 \u06A9\u06D2 \u0634\u0631 \u0633\u06D2\u060C",tafsir:{ghamidi:"A comprehensive plea against every harmful thing within creation."}},{ar:"\u0648\u064E\u0645\u0650\u0646 \u0634\u064E\u0631\u0650\u0651 \u063A\u064E\u0627\u0633\u0650\u0642\u064D \u0625\u0650\u0630\u064E\u0627 \u0648\u064E\u0642\u064E\u0628\u064E",en:"and from the evil of the night when it grows dark,",ur:"\u0627\u0648\u0631 \u0627\u0646\u062F\u06BE\u06CC\u0631\u06D2 \u06A9\u06D2 \u0634\u0631 \u0633\u06D2 \u062C\u0628 \u0648\u06C1 \u0686\u06BE\u0627 \u062C\u0627\u0626\u06D2\u060C",tafsir:{ghamidi:"The dangers that gather under cover of darkness are placed under Allah\u2019s protection."}},{ar:"\u0648\u064E\u0645\u0650\u0646 \u0634\u064E\u0631\u0650\u0651 \u0627\u0644\u0646\u064E\u0651\u0641\u064E\u0651\u0627\u062B\u064E\u0627\u062A\u0650 \u0641\u0650\u064A \u0627\u0644\u0652\u0639\u064F\u0642\u064E\u062F\u0650",en:"and from the evil of those who blow on knots,",ur:"\u0627\u0648\u0631 \u06AF\u0631\u06C1\u0648\u06BA \u0645\u06CC\u06BA \u067E\u06BE\u0648\u0646\u06A9\u0646\u06D2 \u0648\u0627\u0644\u06CC\u0648\u06BA \u06A9\u06D2 \u0634\u0631 \u0633\u06D2\u060C",tafsir:{ghamidi:"A reference to the harm of sorcery and malicious schemes \u2014 Allah alone shields against them."}},{ar:"\u0648\u064E\u0645\u0650\u0646 \u0634\u064E\u0631\u0650\u0651 \u062D\u064E\u0627\u0633\u0650\u062F\u064D \u0625\u0650\u0630\u064E\u0627 \u062D\u064E\u0633\u064E\u062F\u064E",en:"and from the evil of an envier when they envy.\u201D",ur:"\u0627\u0648\u0631 \u062D\u0627\u0633\u062F \u06A9\u06D2 \u0634\u0631 \u0633\u06D2 \u062C\u0628 \u0648\u06C1 \u062D\u0633\u062F \u06A9\u0631\u06D2\u06D4",tafsir:{ghamidi:"The corrosive harm of envy, when acted upon, is the final evil from which refuge is sought."}}]},114:{bismillah:!0,ayahs:[{ar:"\u0642\u064F\u0644\u0652 \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0631\u064E\u0628\u0650\u0651 \u0627\u0644\u0646\u064E\u0651\u0627\u0633\u0650",en:"Say, \u02F9O Prophet,\u02FA \u201CI seek refuge in the Lord of humankind,",ur:"\u06A9\u06C1\u06C1 \u062F\u0648\u060C \u0645\u06CC\u06BA \u0627\u0646\u0633\u0627\u0646\u0648\u06BA \u06A9\u06D2 \u0631\u0628 \u06A9\u06CC \u067E\u0646\u0627\u06C1 \u0645\u0627\u0646\u06AF\u062A\u0627 \u06C1\u0648\u06BA\u060C",tafsir:{ghamidi:"Three of Allah\u2019s attributes are named \u2014 Lord, King, God of mankind \u2014 to take refuge from the subtle enemy within."}},{ar:"\u0645\u064E\u0644\u0650\u0643\u0650 \u0627\u0644\u0646\u064E\u0651\u0627\u0633\u0650",en:"the Master of humankind,",ur:"\u0627\u0646\u0633\u0627\u0646\u0648\u06BA \u06A9\u06D2 \u0628\u0627\u062F\u0634\u0627\u06C1\u060C",tafsir:{ghamidi:"He is the true Sovereign over all people, before whom no hidden whisper escapes."}},{ar:"\u0625\u0650\u0644\u064E\u0670\u0647\u0650 \u0627\u0644\u0646\u064E\u0651\u0627\u0633\u0650",en:"the God of humankind,",ur:"\u0627\u
